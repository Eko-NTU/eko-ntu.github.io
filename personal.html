<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Personal photos of Yohanes Eko Riyanto." />
  <title>Personal | Yohanes Eko Riyanto</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Album grid ── */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .album-card {
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid transparent;
      box-shadow: 0 2px 8px rgba(12,26,46,0.08);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      background: #fff;
    }
    .album-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(12,26,46,0.14); }
    .album-card.active { border-color: var(--gold); }
    .album-cover {
      position: relative; aspect-ratio: 4/3; overflow: hidden;
    }
    .album-cover img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.4s; }
    .album-card:hover .album-cover img { transform:scale(1.04); }
    .album-cover-placeholder {
      width:100%; height:100%; display:flex; align-items:center;
      justify-content:center; font-size:2.8rem;
    }
    .album-badge {
      position:absolute; bottom:8px; right:8px;
      background:rgba(12,26,46,0.65); color:#fff;
      font-size:0.68rem; font-weight:600; padding:2px 8px;
      border-radius:20px;
    }
    .album-meta { padding:0.65rem 0.85rem 0.75rem; }
    .album-name { margin:0; font-size:0.88rem; font-weight:700; color:var(--navy); }
    .album-sub  { margin:0.12rem 0 0; font-size:0.74rem; color:var(--warm-grey); }

    /* ── Expanded panels (shared) ── */
    .gallery-panel {
      display:none; margin-top:1.8rem; margin-bottom:2.5rem;
      border-top:2px solid var(--gold); padding-top:1.3rem;
      animation:slideDown 0.25s ease;
    }
    .gallery-panel.open { display:block; }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .panel-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:1.1rem;
    }
    .panel-title { font-size:0.95rem; font-weight:700; color:var(--navy); }
    .panel-close {
      background:none; border:1px solid var(--border-light);
      cursor:pointer; font-size:0.78rem; color:var(--warm-grey);
      padding:3px 10px; border-radius:4px; transition:background 0.15s;
    }
    .panel-close:hover { background:var(--cream); }

    /* ── Sub-album grid ── */
    .subalbum-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(155px, 1fr));
      gap:1rem;
    }
    .subalbum-card {
      cursor:pointer; border-radius:7px; overflow:hidden;
      border:2px solid transparent;
      box-shadow:0 1px 6px rgba(12,26,46,0.08);
      background:#fff; transition:transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .subalbum-card:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(12,26,46,0.13); }
    .subalbum-card.active { border-color:var(--gold); }
    .subalbum-cover {
      aspect-ratio:4/3; overflow:hidden; position:relative;
    }
    .subalbum-cover img { width:100%; height:100%; object-fit:cover; display:block; }
    .subalbum-cover-placeholder {
      width:100%; height:100%; display:flex; align-items:center;
      justify-content:center; font-size:1.6rem;
    }
    .subalbum-meta { padding:0.5rem 0.7rem 0.6rem; }
    .subalbum-name { margin:0; font-size:0.82rem; font-weight:700; color:var(--navy); }
    .subalbum-count { margin:0.1rem 0 0; font-size:0.72rem; color:var(--warm-grey); }

    /* ── Photo grid ── */
    .photo-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(155px, 1fr));
      gap:0.55rem;
    }
    .photo-thumb {
      aspect-ratio:1; overflow:hidden; border-radius:5px;
      cursor:pointer; transition:transform 0.2s, box-shadow 0.2s;
    }
    .photo-thumb:hover { transform:scale(1.03); box-shadow:0 4px 12px rgba(12,26,46,0.18); }
    .photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; }

    /* ── Lightbox ── */
    .lightbox {
      display:none; position:fixed; inset:0;
      background:rgba(8,16,32,0.94); z-index:2000;
      align-items:center; justify-content:center;
    }
    .lightbox.open { display:flex; }
    .lightbox-img-wrap { position:relative; max-width:88vw; max-height:88vh; }
    .lightbox-img-wrap img { display:block; max-width:88vw; max-height:88vh; object-fit:contain; border-radius:4px; }
    .lightbox-close {
      position:absolute; top:1.2rem; right:1.5rem;
      color:#fff; font-size:1.8rem; cursor:pointer;
      background:none; border:none; opacity:0.8; transition:opacity 0.15s;
    }
    .lightbox-close:hover { opacity:1; }
    .lightbox-nav {
      position:absolute; top:50%; transform:translateY(-50%);
      color:#fff; font-size:2.2rem; cursor:pointer;
      background:rgba(255,255,255,0.08); border:none;
      padding:0.4rem 0.9rem; border-radius:4px; transition:background 0.15s;
    }
    .lightbox-nav:hover { background:rgba(255,255,255,0.18); }
    .lightbox-prev { left:1rem; }
    .lightbox-next { right:1rem; }
    .lightbox-caption {
      position:absolute; bottom:-2rem; left:0; right:0;
      text-align:center; color:rgba(255,255,255,0.5); font-size:0.78rem;
    }

    /* ── Placeholder gradients ── */
    .grad-travel    { background:linear-gradient(135deg,#f4a35a,#e07b39); }
    .grad-family    { background:linear-gradient(135deg,#e8a0a0,#c26b6b); }
    .grad-academic  { background:linear-gradient(135deg,#4a6fa5,#0C1A2E); }
    .grad-singapore { background:linear-gradient(135deg,#52a07a,#2d6e50); }
    .grad-hobbies   { background:linear-gradient(135deg,#8b6fb5,#5c3d8f); }

    .empty-note {
      padding:1.8rem; text-align:center;
      color:var(--warm-grey); font-size:0.85rem;
      border:1px dashed var(--border-light); border-radius:6px;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════════
     PHOTO GALLERY CONFIGURATION
     ───────────────────────────
     Edit this block to add photos and sub-albums.

     Structure:
       ALBUMS  →  array of top-level albums (Travel, Family, …)
         subAlbums  →  array of sub-albums inside each album (Europe 2023, …)
           photos   →  array of photos inside each sub-album

     Photo paths are relative to the site root.
     Example path: "images/personal/travel/europe-2023/photo1.jpg"

     To set an album/sub-album cover image, add a "cover" field.
     If omitted, the first photo is used; if no photos, the emoji icon shows.
═══════════════════════════════════════════════════════════════════════════ -->
<script>
const ALBUMS = [
  {
    id: "travel", name: "Travel", icon: "✈",
    gradient: "grad-travel", desc: "Around the world",
    subAlbums: [
      // Example — uncomment and edit to add a sub-album:
      // {
      //   id: "europe-2023", name: "Europe 2023",
      //   cover: "images/personal/travel/europe-2023/cover.jpg",
      //   photos: [
      //     { src: "images/personal/travel/europe-2023/paris.jpg",     caption: "Paris" },
      //     { src: "images/personal/travel/europe-2023/amsterdam.jpg", caption: "Amsterdam" },
      //   ]
      // },
    ]
  },
  {
    id: "family", name: "Family", icon: "🏠",
    gradient: "grad-family", desc: "Cherished moments",
    subAlbums: []
  },
  {
    id: "academic", name: "Academic Events", icon: "🎓",
    gradient: "grad-academic", desc: "Conferences & workshops",
    subAlbums: []
  },
  {
    id: "singapore", name: "Singapore & NTU", icon: "🦁",
    gradient: "grad-singapore", desc: "Campus & city life",
    subAlbums: []
  },
  {
    id: "hobbies", name: "Hobbies", icon: "🎨",
    gradient: "grad-hobbies", desc: "Interests & leisure",
    subAlbums: []
  }
];
</script>

  <!-- ── Page Hero ── -->
  <header class="page-hero">
    <div class="page-hero-inner">
      <p class="page-hero-label">Yohanes Eko Riyanto</p>
      <h1 class="page-hero-title">Personal</h1>
    </div>
  </header>

  <!-- ── Gallery ── -->
  <section class="section">
    <div class="section-inner">
      <p class="section-label">Browse by album</p>
      <h2 class="section-title">Photo Gallery</h2>

      <!-- Album cards (rendered by JS) -->
      <div class="album-grid" id="album-grid"></div>

      <!-- Sub-album panel (rendered by JS) -->
      <div class="gallery-panel" id="subalbum-panel">
        <div class="panel-header">
          <span class="panel-title" id="subalbum-panel-title"></span>
          <button class="panel-close" onclick="closeSubalbumPanel()">✕ Close</button>
        </div>
        <div class="subalbum-grid" id="subalbum-grid"></div>
      </div>

      <!-- Photo panel (rendered by JS) -->
      <div class="gallery-panel" id="photo-panel">
        <div class="panel-header">
          <span class="panel-title" id="photo-panel-title"></span>
          <button class="panel-close" onclick="closePhotoPanel()">✕ Close</button>
        </div>
        <div class="photo-grid" id="photo-grid"></div>
      </div>
    </div>
  </section>

  <!-- ── Lightbox ── -->
  <div class="lightbox" id="lightbox" onclick="handleLightboxBg(event)">
    <button class="lightbox-close" onclick="closeLightbox()">&#10005;</button>
    <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">&#8249;</button>
    <div class="lightbox-img-wrap">
      <img id="lightbox-img" src="" alt="" />
      <p class="lightbox-caption" id="lightbox-caption"></p>
    </div>
    <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">&#8250;</button>
  </div>

  <!-- ── Footer ── -->
  <footer class="site-footer" style="background:var(--navy);">

  </footer>

  <script>
    // ── Navbar ──
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 20));
    const toggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    toggle.addEventListener('click', () => navLinks.classList.toggle('open'));
    document.addEventListener('click', (e) => {
      if (!toggle.contains(e.target) && !navLinks.contains(e.target)) navLinks.classList.remove('open');
    });

    // ── State ──
    let activeAlbumId    = null;
    let activeSubalbumId = null;
    let lightboxPhotos   = [];
    let lightboxIndex    = 0;

    // ── Render album cards ──
    function renderAlbums() {
      const grid = document.getElementById('album-grid');
      grid.innerHTML = ALBUMS.map(a => {
        const count = a.subAlbums.reduce((n, s) => n + s.photos.length, 0);
        const coverSrc = a.subAlbums.length > 0 && a.subAlbums[0].cover
          ? a.subAlbums[0].cover
          : (a.subAlbums.length > 0 && a.subAlbums[0].photos.length > 0
              ? a.subAlbums[0].photos[0].src : null);
        const coverHtml = coverSrc
          ? `<img src="${coverSrc}" alt="${a.name}" />`
          : `<div class="album-cover-placeholder ${a.gradient}">${a.icon}</div>`;
        const badge = a.subAlbums.length > 0
          ? `<span class="album-badge">${a.subAlbums.length} album${a.subAlbums.length > 1 ? 's' : ''}${count ? ' · ' + count + ' photos' : ''}</span>`
          : '';
        return `
          <div class="album-card" id="card-${a.id}" onclick="toggleAlbum('${a.id}')">
            <div class="album-cover">${coverHtml}${badge}</div>
            <div class="album-meta">
              <p class="album-name">${a.name}</p>
              <p class="album-sub">${a.desc}</p>
            </div>
          </div>`;
      }).join('');
    }

    // ── Toggle album → show sub-albums ──
    function toggleAlbum(id) {
      const album = ALBUMS.find(a => a.id === id);
      const panel = document.getElementById('subalbum-panel');

      if (activeAlbumId === id && panel.classList.contains('open')) {
        closeSubalbumPanel(); return;
      }
      // deactivate previous
      if (activeAlbumId) document.getElementById('card-' + activeAlbumId)?.classList.remove('active');
      closePhotoPanel();

      activeAlbumId = id;
      document.getElementById('card-' + id).classList.add('active');
      document.getElementById('subalbum-panel-title').textContent = album.name;

      const grid = document.getElementById('subalbum-grid');
      if (album.subAlbums.length === 0) {
        grid.innerHTML = `<div class="empty-note" style="grid-column:1/-1;">No sub-albums yet. Add photos via the config block at the top of personal.html.</div>`;
      } else {
        grid.innerHTML = album.subAlbums.map(s => {
          const coverSrc = s.cover || (s.photos.length > 0 ? s.photos[0].src : null);
          const coverHtml = coverSrc
            ? `<img src="${coverSrc}" alt="${s.name}" />`
            : `<div class="subalbum-cover-placeholder ${album.gradient}">📷</div>`;
          return `
            <div class="subalbum-card" id="subcard-${s.id}" onclick="openSubalbum('${album.id}','${s.id}')">
              <div class="subalbum-cover">${coverHtml}</div>
              <div class="subalbum-meta">
                <p class="subalbum-name">${s.name}</p>
                <p class="subalbum-count">${s.photos.length} photo${s.photos.length !== 1 ? 's' : ''}</p>
              </div>
            </div>`;
        }).join('');
      }
      panel.classList.add('open');
      setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }

    // ── Open sub-album → show photos ──
    function openSubalbum(albumId, subId) {
      const album  = ALBUMS.find(a => a.id === albumId);
      const sub    = album.subAlbums.find(s => s.id === subId);
      const panel  = document.getElementById('photo-panel');

      if (activeSubalbumId) document.getElementById('subcard-' + activeSubalbumId)?.classList.remove('active');
      activeSubalbumId = subId;
      document.getElementById('subcard-' + subId)?.classList.add('active');
      document.getElementById('photo-panel-title').textContent = album.name + '  ›  ' + sub.name;

      const grid = document.getElementById('photo-grid');
      if (sub.photos.length === 0) {
        grid.innerHTML = `<div class="empty-note" style="grid-column:1/-1;">No photos yet.</div>`;
      } else {
        grid.innerHTML = sub.photos.map((p, i) =>
          `<div class="photo-thumb" onclick="openLightbox('${albumId}','${subId}',${i})">
             <img src="${p.src}" alt="${p.caption || ''}" loading="lazy" />
           </div>`
        ).join('');
      }
      panel.classList.add('open');
      setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }

    function closeSubalbumPanel() {
      document.getElementById('subalbum-panel').classList.remove('open');
      document.getElementById('photo-panel').classList.remove('open');
      if (activeAlbumId) document.getElementById('card-' + activeAlbumId)?.classList.remove('active');
      activeAlbumId = null; activeSubalbumId = null;
    }
    function closePhotoPanel() {
      document.getElementById('photo-panel').classList.remove('open');
      if (activeSubalbumId) document.getElementById('subcard-' + activeSubalbumId)?.classList.remove('active');
      activeSubalbumId = null;
    }

    // ── Lightbox ──
    function openLightbox(albumId, subId, index) {
      const album = ALBUMS.find(a => a.id === albumId);
      const sub   = album.subAlbums.find(s => s.id === subId);
      lightboxPhotos = sub.photos;
      lightboxIndex  = index;
      showLightboxImage();
      document.getElementById('lightbox').classList.add('open');
      document.addEventListener('keydown', lightboxKeyHandler);
    }
    function showLightboxImage() {
      const p = lightboxPhotos[lightboxIndex];
      document.getElementById('lightbox-img').src = p.src;
      document.getElementById('lightbox-caption').textContent =
        (p.caption ? p.caption + '  ' : '') + '(' + (lightboxIndex + 1) + ' / ' + lightboxPhotos.length + ')';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.removeEventListener('keydown', lightboxKeyHandler);
    }
    function lightboxNav(dir) {
      lightboxIndex = (lightboxIndex + dir + lightboxPhotos.length) % lightboxPhotos.length;
      showLightboxImage();
    }
    function handleLightboxBg(e) { if (e.target === document.getElementById('lightbox')) closeLightbox(); }
    function lightboxKeyHandler(e) {
      if (e.key === 'ArrowRight') lightboxNav(1);
      if (e.key === 'ArrowLeft')  lightboxNav(-1);
      if (e.key === 'Escape')     closeLightbox();
    }

    // ── Init ──
    renderAlbums();
  </script>
